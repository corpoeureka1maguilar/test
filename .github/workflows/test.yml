name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    container: oven/bun:1.3.5-alpine
    steps:
      - uses: actions/checkout@v4

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun run test
