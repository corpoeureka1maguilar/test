resolved_decisions:
  - "Avoided custom `is_gift_card` product field query on `product.product` to prevent registry/module ValueErrors in Odoo. Instead, the gift card product is identified dynamically in the frontend mapping by matching product IDs against the configured `giftCardProductId` loaded from Odoo settings."
  - "Restricted Gift Card payment flow to orders where the total debt is fully covered by the card balance, as the kiosk single-payment architecture does not support multi-payment split/installment flows in the current version."
