  - "Phase 6 (2026-07-06, amendment): instance scoping added post-verify — user identified that IndexedDB (autopay-offline) survives clearConfig()+saveConfig() and is never touched by that flow, so a reconfigured kiosk could otherwise drain/serve another Odoo instance's data. instanceKey = odooUrl+odooDb+stationId, composed once in getInstanceKey() (idbStore.ts). Foreign-instance queue entries stay dormant (never sent/failed/deleted, matching the ADR-3 no-delete-on-failed precedent). Legacy pre-amendment entries/cache rows (no instanceKey) are lazily tagged with whichever instance is active the first time they are read/booted against after the upgrade. DB_VERSION bumped 1->2 (comment-documented; no structural schema change). Requires re-running sdd-verify before archive."
